<form [formGroup]="form" (ngSubmit)="submit()" class="session-op-form">
  @if (submitError(); as error) {
    <div class="session-op-form__error" role="alert">{{ error }}</div>
  }

  <div class="session-op-form__summary">
    <span class="session-op-form__summary-label">課堂</span>
    <span class="session-op-form__summary-value">
      {{ session()?.className }} · {{ session()?.sessionDate }} {{ session()?.startTime }}–{{ session()?.endTime }}
    </span>
  </div>

  <div class="session-op-form__field">
    <label for="assignTeacher" class="session-op-form__label">
      指派老師<span class="session-op-form__required">*</span>
    </label>
    <p-select
      id="assignTeacher"
      formControlName="teacherId"
      [options]="teachers()"
      optionLabel="displayName"
      optionValue="id"
      placeholder="選擇老師"
      styleClass="w-full"
      appendTo="body"
      [filter]="true"
      filterBy="displayName"
      [loading]="loadingTeachers()"
    />
    @if (!loadingTeachers() && teachers().length === 0) {
      <p class="session-op-form__hint">目前沒有符合該課堂分校與科目的可指派老師。</p>
    }
  </div>

  <div class="session-op-form__footer">
    <p-button label="取消" severity="secondary" [text]="true" (onClick)="closeDialog()" />
    <p-button
      label="確認指派"
      severity="primary"
      type="submit"
      [disabled]="form.invalid || loadingTeachers()"
      [loading]="isSubmitting()"
    />
  </div>
</form>
