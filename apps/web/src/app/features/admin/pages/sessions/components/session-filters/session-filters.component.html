<section class="session-filters">
  <div class="session-filters__mobile">
    <p-datepicker
      class="session-filters__mobile-date"
      selectionMode="range"
      [ngModel]="listDateRange()"
      (ngModelChange)="onListDateRangeChange($event)"
      dateFormat="mm/dd"
      placeholder="日期範圍"
      [showIcon]="true"
      [appendTo]="'body'"
      [firstDayOfWeek]="1"
      [numberOfMonths]="1"
      [readonlyInput]="true"
    />
    <button class="session-filters__mobile-toggle" (click)="mobileFilterToggle.emit()">
      <i class="pi pi-filter session-filters__mobile-toggle-icon"></i>
      篩選
      @if (activeFilterCount() > 0) {
        <span class="session-filters__mobile-badge">{{ activeFilterCount() }}</span>
      }
    </button>
  </div>

  <div class="session-filters__row session-filters__row--list">
    <p-datepicker
      class="session-filters__control session-filters__control--date-range"
      selectionMode="range"
      [ngModel]="listDateRange()"
      (ngModelChange)="onListDateRangeChange($event)"
      dateFormat="yy/mm/dd"
      placeholder="選擇日期範圍"
      [showIcon]="true"
      [appendTo]="'body'"
      [firstDayOfWeek]="1"
      [numberOfMonths]="1"
      [readonlyInput]="true"
    />
    @if (campuses().length > 1) {
      <p-multiselect
        class="session-filters__control"
        [options]="campuses()"
        optionLabel="name"
        optionValue="id"
        placeholder="所有分校"
        selectedItemsLabel="{0} 個分校"
        [appendTo]="'body'"
        [filter]="true"
        filterBy="name"
        [ngModel]="selectedCampusIds()"
        (ngModelChange)="onCampusMultiChange($event)"
      />
    }
    @if (selectedCampusIds().length > 0 && availableCourses().length > 0) {
      <p-multiselect
        class="session-filters__control"
        [options]="availableCourses()"
        optionLabel="name"
        optionValue="id"
        placeholder="所有課程"
        selectedItemsLabel="{0} 個課程"
        [appendTo]="'body'"
        [filter]="true"
        filterBy="name"
        [ngModel]="selectedCourseIds()"
        (ngModelChange)="onCourseMultiChange($event)"
      />
    }
    @if (selectedCampusIds().length > 0) {
      <p-multiselect
        class="session-filters__control"
        [options]="teacherOptionGroups()"
        [group]="true"
        optionGroupLabel="label"
        optionGroupChildren="items"
        optionLabel="displayName"
        optionValue="id"
        placeholder="所有老師"
        selectedItemsLabel="{0} 位老師"
        [appendTo]="'body'"
        [filter]="true"
        filterPlaceholder="搜尋老師..."
        [ngModel]="selectedTeacherIds()"
        (ngModelChange)="onTeacherMultiChange($event)"
      />
    }
    @if (selectedCampusIds().length > 0 && selectedCourseIds().length > 0 && availableClasses().length > 0) {
      <p-select
        class="session-filters__control"
        [options]="availableClasses()"
        optionLabel="name"
        optionValue="id"
        placeholder="所有班級"
        [appendTo]="'body'"
        [filter]="true"
        [showClear]="true"
        [ngModel]="selectedClassId()"
        (ngModelChange)="onClassSelectChange($event)"
      />
    }
    <p-multiselect
      class="session-filters__control session-filters__control--status"
      [options]="statusOptions"
      optionLabel="label"
      optionValue="value"
      placeholder="課堂狀態"
      selectedItemsLabel="{0} 種狀態"
      [appendTo]="'body'"
      [ngModel]="selectedStatuses()"
      (ngModelChange)="onStatusesChange($event)"
    />
    @if (hasActiveFilters()) {
      <p-button
        label="清除"
        severity="secondary"
        [text]="true"
        size="small"
        icon="pi pi-times"
        (onClick)="clearFilters.emit()"
      />
    }
  </div>
</section>
